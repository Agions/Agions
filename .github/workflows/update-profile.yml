name: Update Profile

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-snake:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Generate Contribution Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Agions
          github_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: output/snake.svg

      - name: Push snake animation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/snake.svg
          git diff --staged --quiet || git commit -m "docs: auto-update snake animation [skip ci]"
          git push

  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: generate-snake
    steps:
      - uses: actions/checkout@v4

      - name: Update README assets (placeholder for future automation)
        run: |
          echo "Profile README assets are static and version-controlled."
          echo "README.md is a hand-crafted professional profile — updates are manual."

      - name: Verify snake reference in README
        run: |
          if grep -q "snake.svg" README.md; then
            echo "✅ Snake reference found in README"
          else
            echo "⚠️  Snake reference missing — adding it"
            echo -e '\n<p align="center">\n  <img src="https://raw.githubusercontent.com/Agions/Agions/main/output/snake.svg" alt="GitHub Contribution Snake"/>\n</p>' >> README.md
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git diff --staged --quiet || git commit -m "docs: restore snake reference in README [skip ci]"
            git push
          fi