<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" role="img" aria-label="Agions — Full-Stack Developer">
  <title>Agions</title>
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="50%" stop-color="#10131A"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="900" height="200" rx="14" fill="url(#bg3)"/>

  <!-- Horizontal rule top -->
  <rect x="40" y="48" width="820" height="1" fill="#21262D"/>

  <!-- Horizontal rule bottom -->
  <rect x="40" y="152" width="820" height="1" fill="#21262D"/>

  <!-- Left section: Name + role -->
  <text x="60" y="95"
        font-family="'Inter','Segoe UI',Arial,sans-serif"
        font-size="44" font-weight="800" letter-spacing="-1"
        fill="#FFFFFF">Agions</text>

  <!-- Animated underline -->
  <rect x="60" y="104" width="0" height="2.5" rx="1.25" fill="#0A84FF">
    <animate attributeName="width" values="0;140;140" dur="0.9s" begin="0.1s" fill="freeze"/>
  </rect>

  <!-- Blinking cursor -->
  <rect x="205" y="78" width="2.5" height="30" rx="1" fill="#0A84FF" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" dur="1.1s" begin="0.9s" repeatCount="indefinite"/>
  </rect>

  <!-- Role -->
  <text x="60" y="128"
        font-family="'Inter','Segoe UI',Arial,sans-serif"
        font-size="11" font-weight="600" letter-spacing="4"
        fill="#0A84FF">FULL-STACK DEVELOPER</text>

  <!-- Location + focus -->
  <text x="60" y="148"
        font-family="'Inter','Segoe UI',Arial,sans-serif"
        font-size="12" fill="#5C6370">
    Hangzhou, China
  </text>

  <!-- Vertical separator -->
  <rect x="430" y="58" width="1" height="84" rx="0.5" fill="#21262D"/>

  <!-- Right section: Stats -->
  <!-- Repos -->
  <text x="500" y="88"
        font-family="'Inter','Arial',sans-serif"
        font-size="26" font-weight="800" fill="#FFFFFF" text-anchor="middle">12</text>
  <text x="500" y="104"
        font-family="'Inter','Arial',sans-serif"
        font-size="9" font-weight="600" letter-spacing="2" fill="#4D9BFF" text-anchor="middle">REPOS</text>

  <!-- Stars -->
  <text x="600" y="88"
        font-family="'Inter','Arial',sans-serif"
        font-size="26" font-weight="800" fill="#FFFFFF" text-anchor="middle">341</text>
  <text x="600" y="104"
        font-family="'Inter','Arial',sans-serif"
        font-size="9" font-weight="600" letter-spacing="2" fill="#FFC107" text-anchor="middle">STARS</text>

  <!-- Followers -->
  <text x="700" y="88"
        font-family="'Inter','Arial',sans-serif"
        font-size="26" font-weight="800" fill="#FFFFFF" text-anchor="middle">21</text>
  <text x="700" y="104"
        font-family="'Inter','Arial',sans-serif"
        font-size="9" font-weight="600" letter-spacing="2" fill="#30D158" text-anchor="middle">FOLLOW</text>

  <!-- Animated pulsing dot (decorative) -->
  <circle cx="800" cy="82" r="4" fill="#0A84FF" opacity="0.6">
    <animate attributeName="r" values="4;6;4" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="830" cy="82" r="3" fill="#00D4AA" opacity="0.5">
    <animate attributeName="r" values="3;5;3" dur="3.2s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.15;0.5" dur="3.2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="858" cy="82" r="2.5" fill="#FFC107" opacity="0.4">
    <animate attributeName="r" values="2.5;4;2.5" dur="2.8s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.8s" begin="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Subtle tech tag row -->
  <text x="450" y="132"
        font-family="'Inter','Arial',sans-serif"
        font-size="10" font-weight="500" letter-spacing="2"
        fill="#30363D" text-anchor="middle">Tauri · Rust · Python · TypeScript · Vue · AI</text>

</svg>
