<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" role="img" aria-label="Agions — Full-Stack Developer">
  <title>Agions Profile Banner</title>
  <desc>Professional developer profile banner for GitHub</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="50%" stop-color="#0d1420"/>
      <stop offset="100%" stop-color="#080c14"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#1a2235" stroke-width="0.4"/>
    </pattern>
    <radialGradient id="orb-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0A84FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0A84FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-teal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00D4AA" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="avatar-clip">
      <circle cx="68" cy="100" r="28"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="14" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="899" height="199" rx="13.5" fill="none" stroke="#1a2235" stroke-width="0.5"/>
  <!-- Subtle grid -->
  <rect x="0" y="0" width="900" height="200" rx="14" fill="url(#grid)" opacity="0.5"/>
  <!-- Ambient orbs -->
  <ellipse cx="100" cy="100" rx="220" ry="140" fill="url(#orb-blue)"/>
  <ellipse cx="800" cy="100" rx="200" ry="120" fill="url(#orb-teal)"/>
  <!-- Top accent line -->
  <rect x="40" y="0" width="200" height="2" rx="1" fill="#0A84FF" opacity="0.6">
    <animate attributeName="width" values="0;200" dur="1.2s" begin="0.2s" fill="freeze"/>
    <animate attributeName="opacity" values="0;0.6" dur="1.2s" begin="0.2s" fill="freeze"/>
  </rect>

  <!-- Avatar block -->
  <g>
    <!-- Glow ring -->
    <circle cx="68" cy="100" r="34" fill="#0A84FF" opacity="0.06">
      <animate attributeName="r" values="34;37;34" dur="4s" repeatCount="indefinite"/>
    </circle>
    <!-- Avatar bg -->
    <circle cx="68" cy="100" r="28" fill="#0A84FF" opacity="0.12"/>
    <!-- Avatar ring -->
    <circle cx="68" cy="100" r="26" fill="none" stroke="#0A84FF" stroke-width="1.2" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <!-- Avatar text -->
    <text x="68" y="107"
          font-family="'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif"
          font-size="17" font-weight="800" fill="#FFFFFF" text-anchor="middle"
          letter-spacing="-0.5">AG</text>
  </g>

  <!-- Name & Role -->
  <text x="112" y="84"
        font-family="'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="38" font-weight="800" fill="#FFFFFF" letter-spacing="-1"
        filter="url(#glow)">Agions</text>
  <!-- Cursor blink -->
  <rect x="112" y="90" width="2" height="20" rx="1" fill="#0A84FF" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" dur="1.1s" begin="0.6s" repeatCount="indefinite"/>
  </rect>
  <!-- Role tag -->
  <rect x="112" y="100" width="160" height="18" rx="4" fill="#0A84FF" opacity="0.12"/>
  <text x="118" y="113"
        font-family="'SF Pro Text','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="9" font-weight="700" letter-spacing="2.5" fill="#0A84FF">FULL-STACK DEVELOPER</text>
  <!-- Location -->
  <text x="112" y="134"
        font-family="'SF Pro Text','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="12" fill="#4D9BFF" opacity="0.8">Hangzhou, China</text>
  <!-- Tagline -->
  <text x="112" y="153"
        font-family="'SF Pro Text','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="11" fill="#6B7280">Cross-platform desktop · AI audio/video · Open-source</text>

  <!-- Divider -->
  <rect x="438" y="28" width="1" height="144" rx="0.5" fill="#1a2235"/>

  <!-- Stats row 1 -->
  <text x="540" y="68" text-anchor="middle"
        font-family="'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="30" font-weight="800" fill="#FFFFFF">12</text>
  <text x="540" y="84" text-anchor="middle"
        font-family="'SF Pro Text','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="8" font-weight="700" letter-spacing="2" fill="#4D9BFF">REPOS</text>
  <rect x="500" y="90" width="80" height="1.5" rx="0.75" fill="#1a2235"/>
  <rect x="500" y="90" width="0" height="1.5" rx="0.75" fill="#4D9BFF">
    <animate attributeName="width" values="0;70" dur="0.8s" begin="0.5s" fill="freeze"/>
  </rect>

  <text x="630" y="68" text-anchor="middle"
        font-family="'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="30" font-weight="800" fill="#FFFFFF">383</text>
  <text x="630" y="84" text-anchor="middle"
        font-family="'SF Pro Text','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="8" font-weight="700" letter-spacing="2" fill="#FFC107">TOTAL STARS</text>
  <rect x="590" y="90" width="80" height="1.5" rx="0.75" fill="#1a2235"/>
  <rect x="590" y="90" width="0" height="1.5" rx="0.75" fill="#FFC107">
    <animate attributeName="width" values="0;66" dur="0.8s" begin="0.7s" fill="freeze"/>
  </rect>

  <text x="720" y="68" text-anchor="middle"
        font-family="'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="30" font-weight="800" fill="#FFFFFF">21</text>
  <text x="720" y="84" text-anchor="middle"
        font-family="'SF Pro Text','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="8" font-weight="700" letter-spacing="2" fill="#30D158">FOLLOWERS</text>
  <rect x="680" y="90" width="80" height="1.5" rx="0.75" fill="#1a2235"/>
  <rect x="680" y="90" width="0" height="1.5" rx="0.75" fill="#30D158">
    <animate attributeName="width" values="0;56" dur="0.8s" begin="0.9s" fill="freeze"/>
  </rect>

  <text x="810" y="68" text-anchor="middle"
        font-family="'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="30" font-weight="800" fill="#FFFFFF">1656</text>
  <text x="810" y="84" text-anchor="middle"
        font-family="'SF Pro Text','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="8" font-weight="700" letter-spacing="2" fill="#BF5AF2">CONTRIBUTIONS</text>
  <rect x="770" y="90" width="80" height="1.5" rx="0.75" fill="#1a2235"/>
  <rect x="770" y="90" width="0" height="1.5" rx="0.75" fill="#BF5AF2">
    <animate attributeName="width" values="0;60" dur="0.8s" begin="1.1s" fill="freeze"/>
  </rect>

  <!-- Stats row 2 — top repos -->
  <text x="540" y="130" text-anchor="middle"
        font-family="'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="22" font-weight="800" fill="#FFFFFF">162</text>
  <text x="540" y="144" text-anchor="middle"
        font-family="'SF Pro Text','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="7.5" font-weight="700" letter-spacing="1.5" fill="#FF6B6B">taro-bluetooth-print</text>

  <text x="630" y="130" text-anchor="middle"
        font-family="'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="22" font-weight="800" fill="#FFFFFF">128</text>
  <text x="630" y="144" text-anchor="middle"
        font-family="'SF Pro Text','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="7.5" font-weight="700" letter-spacing="1.5" fill="#FF6B6B">HardSubX</text>

  <text x="720" y="130" text-anchor="middle"
        font-family="'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="22" font-weight="800" fill="#FFFFFF">57</text>
  <text x="720" y="144" text-anchor="middle"
        font-family="'SF Pro Text','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="7.5" font-weight="700" letter-spacing="1.5" fill="#FF6B6B">Narrafiilm</text>

  <text x="810" y="130" text-anchor="middle"
        font-family="'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="22" font-weight="800" fill="#FFFFFF">28</text>
  <text x="810" y="144" text-anchor="middle"
        font-family="'SF Pro Text','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="7.5" font-weight="700" letter-spacing="1.5" fill="#FF6B6B">CutDeck</text>

  <!-- Tech ticker -->
  <rect x="40" y="184" width="820" height="0.8" rx="0.4" fill="#1a2235"/>
  <text x="60" y="194" font-family="'SF Mono','JetBrains Mono','Consolas',monospace"
        font-size="9.5" font-weight="500" fill="#30363D" letter-spacing="0.5">
    <tspan fill="#0A84FF">▸</tspan>
    <tspan dx="6" fill="#E8A838">rust</tspan>
    <tspan dx="8" fill="#30363D">·</tspan>
    <tspan dx="8" fill="#3178C6">typescript</tspan>
    <tspan dx="8" fill="#30363D">·</tspan>
    <tspan dx="8" fill="#4FC08D">vue</tspan>
    <tspan dx="8" fill="#30363D">·</tspan>
    <tspan dx="8" fill="#61DAFB">react</tspan>
    <tspan dx="8" fill="#30363D">·</tspan>
    <tspan dx="8" fill="#3776AB">python</tspan>
    <tspan dx="8" fill="#30363D">·</tspan>
    <tspan dx="8" fill="#FF6F00">whisper</tspan>
    <tspan dx="8" fill="#30363D">·</tspan>
    <tspan dx="8" fill="#00D4AA">ffmpeg</tspan>
    <tspan dx="8" fill="#30363D">·</tspan>
    <tspan dx="8" fill="#FFC131">tauri</tspan>
    <animateTransform attributeName="transform" type="translate"
      values="0,0;-420,0;0,0" dur="28s" begin="2s" repeatCount="indefinite"/>
  </text>

  <!-- Corner accents -->
  <path d="M0,16 L0,0 L16,0" fill="none" stroke="#0A84FF" stroke-width="1.5" opacity="0.5"/>
  <path d="M884,0 L900,0 L900,16" fill="none" stroke="#0A84FF" stroke-width="1.5" opacity="0.5"/>
  <path d="M0,184 L0,200 L16,200" fill="none" stroke="#0A84FF" stroke-width="1.5" opacity="0.5"/>
  <path d="M884,200 L900,200 L900,184" fill="none" stroke="#0A84FF" stroke-width="1.5" opacity="0.5"/>
</svg>
