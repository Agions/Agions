<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" role="img" aria-label="Agions — Full-Stack Developer">
  <title>Agions Profile Banner</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="50%" stop-color="#0d1420"/>
      <stop offset="100%" stop-color="#080c14"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2235" stroke-width="0.5"/>
    </pattern>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0A84FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0A84FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00D4AA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#BF5AF2" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#BF5AF2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" rx="16" fill="url(#bg)"/>
  <!-- Grid -->
  <rect x="0" y="0" width="900" height="220" rx="16" fill="url(#grid)" opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="4s" repeatCount="indefinite"/>
  </rect>
  <!-- Orbs -->
  <ellipse cx="120" cy="110" rx="200" ry="150" fill="url(#orb1)">
    <animate attributeName="rx" values="200;230;200" dur="6s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="780" cy="110" rx="180" ry="130" fill="url(#orb2)">
    <animate attributeName="ry" values="130;160;130" dur="5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="450" cy="220" rx="300" ry="80" fill="url(#orb3)">
    <animate attributeName="rx" values="300;350;300" dur="7s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Scan line -->
  <rect x="0" y="-10" width="900" height="2" fill="#0A84FF" opacity="0">
    <animate attributeName="y" values="-10;230" dur="8s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.3;0.3;0" dur="8s" begin="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Avatar ring -->
  <circle cx="72" cy="108" r="38" fill="#0A84FF" opacity="0.08"/>
  <circle cx="72" cy="108" r="32" fill="none" stroke="#0A84FF" stroke-width="1.5" opacity="0.5">
    <animate attributeName="r" values="32;34;32" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="72" cy="108" r="27" fill="#0A84FF" opacity="0.12"/>
  <text x="72" y="114" font-family="'SF Pro Display','Inter',Arial,sans-serif"
        font-size="16" font-weight="800" fill="#FFFFFF" text-anchor="middle">AG</text>

  <!-- Orbiting particles -->
  <circle cx="72" cy="76" r="2.5" fill="#0A84FF" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" from="0 72 108" to="360 72 108" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="108" r="2" fill="#00D4AA" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="2.5s" begin="0.8s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" from="0 72 108" to="360 72 108" dur="3s" begin="0.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Name -->
  <text x="130" y="85"
        font-family="'SF Pro Display','Inter',Arial,sans-serif"
        font-size="42" font-weight="800" letter-spacing="-0.5"
        fill="#FFFFFF" filter="url(#glow)">
    Agions
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.1s" fill="freeze"/>
  </text>

  <!-- Typing underline -->
  <rect x="130" y="93" width="0" height="2.5" rx="1.25" fill="#0A84FF">
    <animate attributeName="width" values="0;118;118" dur="0.8s" begin="0.4s" fill="freeze"/>
  </rect>
  <rect x="130" y="93" width="118" height="2.5" rx="1.25" fill="#0A84FF" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="2s" begin="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Blinking cursor -->
  <rect x="130" y="65" width="2.5" height="32" rx="1" fill="#0A84FF" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" dur="1s" begin="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Role -->
  <rect x="130" y="106" width="148" height="20" rx="4" fill="#0A84FF" opacity="0.15"/>
  <text x="136" y="120"
        font-family="'SF Pro Text','Inter',Arial,sans-serif"
        font-size="10" font-weight="700" letter-spacing="3"
        fill="#0A84FF">
    FULL-STACK DEVELOPER
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1s" fill="freeze"/>
  </text>

  <!-- Location -->
  <text x="130" y="142"
        font-family="'SF Pro Text','Inter',Arial,sans-serif"
        font-size="12" fill="#4D9BFF" opacity="0.8">
    Hangzhou, China
    <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="1.2s" fill="freeze"/>
  </text>

  <!-- Description -->
  <text x="130" y="160"
        font-family="'SF Pro Text','Inter',Arial,sans-serif"
        font-size="11" fill="#6B7280" letter-spacing="0.3">
    Cross-platform desktop · AI audio/video tools · Open-source full-stack dev
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.4s" fill="freeze"/>
  </text>

  <!-- Separator line -->
  <rect x="448" y="30" width="1" height="160" rx="0.5" fill="#1a2235"/>
  <rect x="448" y="30" width="1" height="160" rx="0.5" fill="#0A84FF" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="height" values="0;160" dur="1.5s" begin="1.5s" fill="freeze"/>
  </rect>

  <!-- Stats -->
  <text x="555" y="72" text-anchor="middle"
        font-family="'SF Pro Display','Inter',Arial,sans-serif"
        font-size="34" font-weight="800" fill="#FFFFFF" filter="url(#glow)">12</text>
  <text x="555" y="90" text-anchor="middle"
        font-family="'SF Pro Text','Inter',Arial,sans-serif"
        font-size="9" font-weight="700" letter-spacing="2.5" fill="#4D9BFF">REPOSITORIES</text>
  <rect x="495" y="98" width="120" height="2" rx="1" fill="#1a2235"/>
  <rect x="495" y="98" width="0" height="2" rx="1" fill="#4D9BFF">
    <animate attributeName="width" values="0;100;100" dur="1s" begin="0.8s" fill="freeze"/>
  </rect>

  <text x="675" y="72" text-anchor="middle"
        font-family="'SF Pro Display','Inter',Arial,sans-serif"
        font-size="34" font-weight="800" fill="#FFFFFF" filter="url(#glow)">383</text>
  <text x="675" y="90" text-anchor="middle"
        font-family="'SF Pro Text','Inter',Arial,sans-serif"
        font-size="9" font-weight="700" letter-spacing="2.5" fill="#FFC107">TOTAL STARS</text>
  <rect x="615" y="98" width="120" height="2" rx="1" fill="#1a2235"/>
  <rect x="615" y="98" width="0" height="2" rx="1" fill="#FFC107">
    <animate attributeName="width" values="0;96;96" dur="1.2s" begin="1s" fill="freeze"/>
  </rect>

  <text x="555" y="132" text-anchor="middle"
        font-family="'SF Pro Display','Inter',Arial,sans-serif"
        font-size="34" font-weight="800" fill="#FFFFFF" filter="url(#glow)">21</text>
  <text x="555" y="150" text-anchor="middle"
        font-family="'SF Pro Text','Inter',Arial,sans-serif"
        font-size="9" font-weight="700" letter-spacing="2.5" fill="#30D158">FOLLOWERS</text>
  <rect x="495" y="158" width="120" height="2" rx="1" fill="#1a2235"/>
  <rect x="495" y="158" width="0" height="2" rx="1" fill="#30D158">
    <animate attributeName="width" values="0;72;72" dur="1s" begin="1.4s" fill="freeze"/>
  </rect>

  <text x="675" y="132" text-anchor="middle"
        font-family="'SF Pro Display','Inter',Arial,sans-serif"
        font-size="34" font-weight="800" fill="#FFFFFF" filter="url(#glow)">1656</text>
  <text x="675" y="150" text-anchor="middle"
        font-family="'SF Pro Text','Inter',Arial,sans-serif"
        font-size="9" font-weight="700" letter-spacing="2.5" fill="#BF5AF2">CONTRIBUTIONS</text>
  <rect x="615" y="158" width="120" height="2" rx="1" fill="#1a2235"/>
  <rect x="615" y="158" width="0" height="2" rx="1" fill="#BF5AF2">
    <animate attributeName="width" values="0;88;88" dur="1s" begin="1.6s" fill="freeze"/>
  </rect>

  <!-- Floating particles -->
  <circle cx="860" cy="30" r="3" fill="#0A84FF" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="3s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="30;80;30" dur="4s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="845" cy="20" r="2" fill="#00D4AA" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="2.5s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="20;70;20" dur="3.5s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="870" cy="45" r="1.5" fill="#BF5AF2" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="4s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="45;90;45" dur="5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="40" cy="190" r="2" fill="#FFC107" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="3.5s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="190;160;190" dur="4.5s" begin="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="25" cy="200" r="1.5" fill="#0A84FF" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="2.8s" begin="2.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="200;165;200" dur="3.8s" begin="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="50" r="1.5" fill="#FFFFFF" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0" dur="5s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="380;400;380" dur="6s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="50;70;50" dur="6s" begin="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Bottom tech ticker -->
  <rect x="40" y="200" width="820" height="1" fill="#1a2235"/>
  <text x="900" y="214" font-family="'SF Pro Text','Inter',monospace"
        font-size="10" font-weight="500" letter-spacing="1.5" fill="#30363D" text-anchor="start">
    <tspan fill="#0A84FF">⚡</tspan> Tauri
    <tspan dx="12" fill="#30363D"> · </tspan>
    <tspan dx="12" fill="#CE8F2E">🦀</tspan> Rust
    <tspan dx="12" fill="#30363D"> · </tspan>
    <tspan dx="12" fill="#3776AB">🐍</tspan> Python
    <tspan dx="12" fill="#30363D"> · </tspan>
    <tspan dx="12" fill="#3178C6">TS</tspan> TypeScript
    <tspan dx="12" fill="#30363D"> · </tspan>
    <tspan dx="12" fill="#4FC08D">▲</tspan> Vue.js
    <tspan dx="12" fill="#30363D"> · </tspan>
    <tspan dx="12" fill="#61DAFB">⚛</tspan> React
    <tspan dx="12" fill="#30363D"> · </tspan>
    <tspan dx="12" fill="#FF6F00">🎙</tspan> Whisper
    <tspan dx="12" fill="#30363D"> · </tspan>
    <tspan dx="12" fill="#00D4AA">🎬</tspan> FFmpeg
    <tspan dx="12" fill="#30363D"> · </tspan>
    <tspan dx="12" fill="#2496ED">🐳</tspan> Docker
    <animateTransform attributeName="transform" type="translate"
      values="0,0;-400,0;0,0" dur="20s" begin="1.8s" repeatCount="indefinite"/>
  </text>

  <!-- Corner accents -->
  <path d="M0,20 L0,0 L20,0" fill="none" stroke="#0A84FF" stroke-width="2" opacity="0.4"/>
  <path d="M880,0 L900,0 L900,20" fill="none" stroke="#0A84FF" stroke-width="2" opacity="0.4"/>
  <path d="M0,200 L0,220 L20,220" fill="none" stroke="#0A84FF" stroke-width="2" opacity="0.4"/>
  <path d="M880,220 L900,220 L900,200" fill="none" stroke="#0A84FF" stroke-width="2" opacity="0.4"/>
</svg>
