<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 88" role="img" aria-label="Agions — Profile Card">
  <title>Agions Profile Card</title>
  <desc>Compact profile card for sidebar embedding</desc>
  <defs>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0e17"/>
    </linearGradient>
    <filter id="card-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card bg -->
  <rect width="280" height="88" rx="10" fill="url(#card-bg)"/>
  <rect x="0.5" y="0.5" width="279" height="87" rx="9.5" fill="none" stroke="#21262D" stroke-width="0.8"/>

  <!-- Left accent bar -->
  <rect x="0" y="20" width="3" height="48" rx="1.5" fill="#0A84FF" opacity="0.7"/>

  <!-- Avatar -->
  <circle cx="32" cy="44" r="20" fill="#0A84FF" opacity="0.08"/>
  <circle cx="32" cy="44" r="16" fill="none" stroke="#0A84FF" stroke-width="1" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"/>
  </circle>
  <text x="32" y="49"
        font-family="'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="13" font-weight="800" fill="#FFFFFF" text-anchor="middle">AG</text>

  <!-- Identity block -->
  <text x="60" y="34"
        font-family="'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="17" font-weight="800" fill="#FFFFFF" letter-spacing="-0.3">Agions</text>
  <rect x="60" y="38" width="56" height="1.5" rx="0.75" fill="#0A84FF" opacity="0.5"/>
  <text x="60" y="52"
        font-family="'SF Pro Text','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="8" font-weight="700" letter-spacing="2" fill="#0A84FF">FULL-STACK DEV</text>
  <text x="60" y="64"
        font-family="'SF Pro Text','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="9" fill="#6B7280">Hangzhou, China</text>

  <!-- Divider -->
  <rect x="144" y="16" width="1" height="56" rx="0.5" fill="#21262D"/>

  <!-- Stats -->
  <text x="182" y="34" text-anchor="middle"
        font-family="'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="16" font-weight="800" fill="#FFFFFF" filter="url(#card-glow)">12</text>
  <text x="182" y="46" text-anchor="middle"
        font-family="'SF Pro Text','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="7.5" font-weight="600" letter-spacing="1" fill="#4D9BFF">REPOS</text>

  <text x="220" y="34" text-anchor="middle"
        font-family="'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="16" font-weight="800" fill="#FFFFFF" filter="url(#card-glow)">383</text>
  <text x="220" y="46" text-anchor="middle"
        font-family="'SF Pro Text','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="7.5" font-weight="600" letter-spacing="1" fill="#FFC107">STARS</text>

  <text x="258" y="34" text-anchor="middle"
        font-family="'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="16" font-weight="800" fill="#FFFFFF" filter="url(#card-glow)">21</text>
  <text x="258" y="46" text-anchor="middle"
        font-family="'SF Pro Text','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="7.5" font-weight="600" letter-spacing="1" fill="#30D158">FOLLOW</text>

  <!-- Separator dots -->
  <circle cx="158" cy="36" r="1.5" fill="#30363D"/>
  <circle cx="158" cy="44" r="1.5" fill="#30363D"/>
  <circle cx="158" cy="52" r="1.5" fill="#30363D"/>

  <!-- Bottom bar -->
  <rect x="60" y="74" width="198" height="0.8" rx="0.4" fill="#21262D"/>
  <text x="60" y="83"
        font-family="'SF Mono','JetBrains Mono','Consolas',monospace"
        font-size="8" fill="#30363D" letter-spacing="0.3">
    <tspan fill="#0A84FF">▸</tspan>
    <tspan dx="4" fill="#E8A838">rust</tspan>
    <tspan dx="6" fill="#3178C6">ts</tspan>
    <tspan dx="6" fill="#4FC08D">vue</tspan>
    <tspan dx="6" fill="#3776AB">py</tspan>
    <tspan dx="6" fill="#FF6F00">whisper</tspan>
    <animateTransform attributeName="transform" type="translate"
      values="0,0;-120,0;0,0" dur="18s" begin="1s" repeatCount="indefinite"/>
  </text>
</svg>
