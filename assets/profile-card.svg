<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 400 200">
  <style>
    .card-bg { fill: #0d1117; }
    .card-border { fill: none; stroke: #30363d; stroke-width: 1; }
    .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #f0f6fc; }
    .subtitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 14px; fill: #8b949e; }
    .tag { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 12px; fill: #58a6ff; }
  </style>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-8; 0,0" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
    <rect class="card-bg" x="0" y="0" width="400" height="200" rx="12"/>
    <rect class="card-border" x="0.5" y="0.5" width="399" height="199" rx="12"/>
    <text class="title" x="200" y="70" text-anchor="middle">Agions</text>
    <text class="subtitle" x="200" y="100" text-anchor="middle">视频工具 · AI 应用 · 开源全栈</text>
    <text class="tag" x="200" y="140" text-anchor="middle">杭州 · Tauri · Rust · Python · TypeScript</text>
    <text class="tag" x="200" y="165" text-anchor="middle">FFmpeg · Whisper · Vue · React</text>
  </g>
</svg>
