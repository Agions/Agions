<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 90" role="img" aria-label="Agions — Full-Stack Developer">
  <title>Agions Profile Card</title>
  <defs>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#0d1420"/>
    </linearGradient>
    <radialGradient id="avatar-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0A84FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0A84FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="300" height="90" rx="14" fill="url(#card-bg)"/>
  <rect x="0.5" y="0.5" width="299" height="89" rx="13.5" fill="none" stroke="#1a2235" stroke-width="1"/>
  <rect x="20" y="0" width="260" height="1" rx="0.5" fill="#0A84FF" opacity="0.3">
    <animate attributeName="opacity" values="0.15;0.4;0.15" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Avatar pulse ring -->
  <circle cx="42" cy="45" r="24" fill="url(#avatar-glow)">
    <animate attributeName="r" values="24;27;24" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="42" cy="45" r="19" fill="#0A84FF" opacity="0.1"/>
  <circle cx="42" cy="45" r="16" fill="none" stroke="#0A84FF" stroke-width="1.5" opacity="0.6">
    <animate attributeName="r" values="16;18;16" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="42" y="50" font-family="'SF Pro Display','Inter',Arial,sans-serif"
        font-size="13" font-weight="800" fill="#FFFFFF" text-anchor="middle">AG</text>

  <!-- Name -->
  <text x="72" y="38"
        font-family="'SF Pro Display','Inter',Arial,sans-serif"
        font-size="20" font-weight="800" fill="#FFFFFF" letter-spacing="-0.3">Agions</text>
  <!-- Typing underline -->
  <rect x="72" y="43" width="0" height="2" rx="1" fill="#0A84FF">
    <animate attributeName="width" values="0;70;70" dur="0.7s" begin="0.3s" fill="freeze"/>
  </rect>

  <!-- Role -->
  <text x="72" y="57"
        font-family="'SF Pro Text','Inter',Arial,sans-serif"
        font-size="9" font-weight="700" letter-spacing="2.5"
        fill="#0A84FF" opacity="0">
    FULL-STACK DEVELOPER
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.8s" fill="freeze"/>
  </text>

  <!-- Location -->
  <text x="72" y="71"
        font-family="'SF Pro Text','Inter',Arial,sans-serif"
        font-size="10" fill="#4D9BFF" opacity="0.7">
    Hangzhou, China
    <animate attributeName="opacity" values="0;0.7" dur="0.3s" begin="1s" fill="freeze"/>
  </text>

  <!-- Separator -->
  <rect x="162" y="18" width="1" height="54" rx="0.5" fill="#1a2235"/>
  <rect x="162" y="18" width="1" height="0" rx="0.5" fill="#0A84FF" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="4s" begin="1.2s" repeatCount="indefinite"/>
    <animate attributeName="height" values="0;54" dur="1.5s" begin="1.2s" fill="freeze"/>
  </rect>

  <!-- Stats -->
  <text x="200" y="36" text-anchor="middle"
        font-family="'SF Pro Display','Inter',Arial,sans-serif"
        font-size="18" font-weight="800" fill="#FFFFFF">12</text>
  <text x="200" y="50" text-anchor="middle"
        font-family="'SF Pro Text','Inter',Arial,sans-serif"
        font-size="8" font-weight="700" letter-spacing="1" fill="#4D9BFF">REPOS</text>

  <text x="236" y="36" text-anchor="middle"
        font-family="'SF Pro Display','Inter',Arial,sans-serif"
        font-size="18" font-weight="800" fill="#FFFFFF">383</text>
  <text x="236" y="50" text-anchor="middle"
        font-family="'SF Pro Text','Inter',Arial,sans-serif"
        font-size="8" font-weight="700" letter-spacing="1" fill="#FFC107">STARS</text>

  <text x="272" y="36" text-anchor="middle"
        font-family="'SF Pro Display','Inter',Arial,sans-serif"
        font-size="18" font-weight="800" fill="#FFFFFF">21</text>
  <text x="272" y="50" text-anchor="middle"
        font-family="'SF Pro Text','Inter',Arial,sans-serif"
        font-size="8" font-weight="700" letter-spacing="1" fill="#30D158">FOLLOW</text>

  <!-- Animated corner dot -->
  <circle cx="285" cy="14" r="2.5" fill="#0A84FF" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="2s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="285" cy="14" r="1.5" fill="#00D4AA" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="2.5s" begin="2s" repeatCount="indefinite"/>
  </circle>
</svg>
